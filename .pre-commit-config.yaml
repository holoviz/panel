default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: \.min\.js$
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # frozen: v0.15.20
    hooks:
      - id: ruff-check
        files: panel/
  - repo: https://github.com/pycqa/isort
    rev: dac090ce4d9ee313d086e2e89ab1acb8c2664fa1  # frozen: 9.0.0a3
    hooks:
      - id: isort
        name: isort (python)
  - repo: https://github.com/hoxbro/clean_notebook
    rev: ba97036e6f0408aa318165535665c35a9423c352  # frozen: v0.2.1
    hooks:
      - id: clean-notebook
        args: [-i, tags]
        exclude: '^lite/files/.*/'
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
  - repo: https://github.com/hoxbro/prettier-pre-commit
    rev: 723303adce45b84f96dc1d9f1c697dc9d993ff7e  # frozen: v3.9.4
    hooks:
      - id: prettier
        entry: prettier --write --ignore-unknown --no-error-on-unmatched-pattern
        types_or: [css]
  - repo: https://github.com/oxipng/oxipng
    rev: 628e241e23f368097883807fa6e985ccf7c00357  # frozen: v10.1.1
    hooks:
      - id: oxipng
        stages: [manual]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 8763fc929b6232999d541a3d8eb49965a6b71afb  # frozen: v10.6.0
    hooks:
      - id: eslint
        args: ['--config', 'panel/eslint.config.js', 'panel/*.ts', 'panel/models/**/*.ts', '--fix']
        additional_dependencies:
          - 'eslint@9.39.1'
          - '@stylistic/eslint-plugin@5.9.0'
          - '@typescript-eslint/eslint-plugin@8.56.1'
          - '@typescript-eslint/parser@8.56.1'
          - 'typescript-eslint@8.56.1'
ci:
  autofix_prs: false
  autoupdate_schedule: quarterly
