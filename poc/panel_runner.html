<!DOCTYPE html>
<!--
  Panel Runner — The Core Primitive
  ==================================
  Loads Pyodide + Bokeh/Panel JS once and executes Panel Python code.
  Used as an iframe by embed.html and playground.html, or standalone.

  - As iframe: receives postMessage({type: 'run', code: '...'})
  - Standalone: runs a self-test demo

  Serve with: python serve.py
  Open: http://localhost:8080/panel_runner.html
-->
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Panel Runner</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    #output { width: 100%; min-height: 100px; }
  </style>
</head>
<body>
  <div id="output"></div>
  <script src="panel-embed.js"></script>
  <script>
    // Initialize Pyodide via panel-embed.js shared runtime
    var readyPromise = PanelEmbed.init().then(function () {
      // Notify parent iframe that we're ready
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'ready' }, '*');
      }
    });

    // Listen for postMessage from parent (iframe API)
    window.addEventListener('message', async function (event) {
      var msg = event.data;
      if (msg && msg.type === 'run' && msg.code) {
        await PanelEmbed._runRunnerApp(msg.code);
      }
    });

    // Expose global API for direct use
    window.runPanelCode = PanelEmbed._runRunnerApp;
    window.panelRunnerReady = readyPromise;

    // Self-test when opened directly (not in iframe)
    if (window.parent === window) {
      readyPromise.then(function () {
        PanelEmbed._runRunnerApp(
          'import panel as pn\n\n' +
          'pn.extension(sizing_mode="stretch_width")\n\n' +
          "slider = pn.widgets.FloatSlider(start=0, end=10, name='Amplitude', value=5)\n\n" +
          'def callback(amplitude):\n' +
          "    return f'## Amplitude: {amplitude:.1f}'\n\n" +
          'pn.Column(\n' +
          '    "# Panel Runner - Self Test",\n' +
          '    "Edit and run code to see it render here.",\n' +
          '    slider,\n' +
          '    pn.bind(callback, slider),\n' +
          ').servable()'
        );
      });
    }
  </script>
</body>
</html>
